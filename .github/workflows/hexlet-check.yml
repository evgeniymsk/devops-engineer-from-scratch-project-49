name: hexlet-check

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Hexlet project check
        uses: hexlet/project-action@0e97d42085680128e057515b551ba62094bd4c49
        with:
          hexlet-id: ${{ secrets.HEXLET_ID }}
