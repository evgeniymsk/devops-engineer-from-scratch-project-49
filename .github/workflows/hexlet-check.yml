name: hexlet-check

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Hexlet project check
        uses: hexlet/project-action@cc61766bf9da94f00e25f82cf80acb8012d2db17
        with:
          hexlet-id: ${{ secrets.HEXLET_ID }}
